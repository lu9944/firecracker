name: Build and Release Docker Kernel

on:
  push:
    branches:
      - main
    paths:
      - 'resources/guest_configs/docker.config'
      - 'resources/guest_configs/microvm-kernel-ci-x86_64-6.1.config'
      - 'resources/guest_configs/ci.config'
      - 'scripts/build-docker-kernel.sh'
      - '.github/workflows/build-docker-kernel.yml'
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Kernel version to build (e.g. 6.1)'
        required: false
        default: '6.1'
      create_release:
        description: 'Create a GitHub release'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

env:
  KERNEL_VERSION: ${{ github.event.inputs.kernel_version || '6.1' }}

jobs:
  build-docker-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Firecracker
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc flex bison gcc make libelf-dev libssl-dev

      - name: Cache kernel source
        id: cache-kernel-src
        uses: actions/cache@v4
        with:
          path: /tmp/linux
          key: amazonlinux-kernel-src-${{ env.KERNEL_VERSION }}

      - name: Clone Amazon Linux kernel source
        if: steps.cache-kernel-src.outputs.cache-hit != 'true'
        run: |
          git clone --no-checkout --filter=tree:0 \
            https://github.com/amazonlinux/linux /tmp/linux

      - name: Build Docker-capable kernel
        run: |
          cd /tmp/linux

          TAG=$(git --no-pager tag -l --sort=-v:refname \
            | grep "microvm-kernel-${{ env.KERNEL_VERSION }}\..*\.amzn2" \
            | head -n1)
          if [ -z "$TAG" ]; then
            echo "ERROR: No tag found for kernel version ${{ env.KERNEL_VERSION }}"
            exit 1
          fi
          echo "Using kernel tag: $TAG"
          echo "KERNEL_TAG=$TAG" >> $GITHUB_ENV

          make distclean || true
          git checkout "$TAG"
          git checkout -B "docker-build-$TAG"

          CONFIG_DIR="$GITHUB_WORKSPACE/resources/guest_configs"
          cat \
            "$CONFIG_DIR/microvm-kernel-ci-x86_64-${{ env.KERNEL_VERSION }}.config" \
            "$CONFIG_DIR/ci.config" \
            "$CONFIG_DIR/docker.config" \
            > .config

          echo "=== Kernel config summary ==="
          echo "Base: $CONFIG_DIR/microvm-kernel-ci-x86_64-${{ env.KERNEL_VERSION }}.config"
          echo "CI:   $CONFIG_DIR/ci.config"
          echo "Docker: $CONFIG_DIR/docker.config"

          make olddefconfig
          make -j$(nproc) vmlinux

          LATEST_VERSION=$(cat include/config/kernel.release)
          normalized_version=$(echo "$LATEST_VERSION" | sed -E "s/(.*[[:digit:]]).*/\1/g")
          echo "KERNEL_VERSION_FULL=$LATEST_VERSION" >> $GITHUB_ENV
          echo "KERNEL_VERSION_NORMALIZED=$normalized_version" >> $GITHUB_ENV

          mkdir -p /tmp/kernel-output
          cp -v vmlinux "/tmp/kernel-output/vmlinux-${normalized_version}-docker"
          cp -v .config "/tmp/kernel-output/vmlinux-${normalized_version}-docker.config"

          echo "=== Kernel build complete ==="
          ls -lh /tmp/kernel-output/
          du -sh "/tmp/kernel-output/vmlinux-${normalized_version}-docker"

          git reset --hard HEAD
          git clean -f -d
          git checkout -

      - name: Verify Docker kernel config
        run: |
          chmod +x scripts/verify-docker-kernel.sh
          scripts/verify-docker-kernel.sh \
            "/tmp/kernel-output/vmlinux-${{ env.KERNEL_VERSION_NORMALIZED }}-docker.config"

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-kernel-${{ env.KERNEL_VERSION_NORMALIZED }}
          path: /tmp/kernel-output/
          retention-days: 30

      - name: Generate release tag
        id: release-tag
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          RELEASE_TAG="docker-kernel-${{ env.KERNEL_VERSION_NORMALIZED }}-${TIMESTAMP}"
          echo "tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.release-tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          name: "Docker-capable Guest Kernel ${{ env.KERNEL_VERSION_FULL }}"
          body: |
            ## Docker-capable Firecracker Guest Kernel

            Built from Amazon Linux kernel tag: `${{ env.KERNEL_TAG }}`
            Kernel version: `${{ env.KERNEL_VERSION_FULL }}`

            ### What's included
            This kernel extends the official Firecracker `microvm-kernel-ci-x86_64-6.1.config` with Docker/containerd support:

            - **Network devices**: TUN/TAP, DUMMY, MACVLAN, IPVLAN, VXLAN
            - **IPVS load balancing**: Round-robin, weighted, and more schedulers
            - **Netfilter/iptables**: MARK, connmark, LOG, NFLOG, NFQUEUE, physdev, multiport, comment, limit, recent, BPF, socket, state, statistic, string, time matches
            - **Container features**: CHECKPOINT_RESTORE

            ### Usage
            ```bash
            # Download the kernel
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.release-tag.outputs.tag }}/vmlinux-${{ env.KERNEL_VERSION_NORMALIZED }}-docker

            # Use with Firecracker
            ./firecracker --config-file vmconfig.json
            # Set kernelImagePath to the downloaded vmlinux file
            ```

            ### Config files
            - `vmlinux-${{ env.KERNEL_VERSION_NORMALIZED }}-docker` — the kernel binary
            - `vmlinux-${{ env.KERNEL_VERSION_NORMALIZED }}-docker.config` — the full kernel .config used for this build
          files: |
            /tmp/kernel-output/vmlinux-${{ env.KERNEL_VERSION_NORMALIZED }}-docker
            /tmp/kernel-output/vmlinux-${{ env.KERNEL_VERSION_NORMALIZED }}-docker.config
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
